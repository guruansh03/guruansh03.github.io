<!DOCTYPE html><html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1.0"> <title>Guruansh Singh — Portfolio</title> <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"> <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:17px}
body{overflow-x:hidden;cursor:none;transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}
ul{list-style:none}
.hide{display:none!important}
#w-terminal,#w-parchment{width:100%;min-height:100vh;position:relative}
#scroll-prog{position:fixed;top:0;left:0;height:2px;width:0;z-index:100001}
body.terminal #scroll-prog{background:#00ff41}
body.parchment #scroll-prog{background:#2d6a6a}

#cur-dot,#cur-ring{pointer-events:none;position:fixed;z-index:100000}
#cur-dot{width:8px;height:8px;transform:translate(-50%,-50%)}
#cur-ring{width:32px;height:32px;transform:translate(-50%,-50%)}
.cur-trail{position:fixed;pointer-events:none;z-index:99999;border-radius:50%;transition:opacity .5s;opacity:0}

body.terminal #cur-dot{background:#00ff41;box-shadow:0 0 6px #00ff41;border-radius:0}
body.terminal #cur-ring{border:2px solid rgba(0,255,65,.25);border-radius:0}
body.terminal .cur-trail{background:#00ff41}

body.parchment #cur-dot{background:#2d6a6a;box-shadow:0 0 5px rgba(45,106,106,.4);border-radius:0}
body.parchment #cur-ring{border:2px solid rgba(45,106,106,.25);border-radius:0}
body.parchment .cur-trail{background:#2d6a6a}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%!important;height:100%!important}

.site-nav{position:fixed;top:50%;right:0;transform:translateY(-50%);z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:0;padding:8px 0}
.site-nav a{display:flex;align-items:center;gap:10px;padding:7px 16px 7px 12px;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;text-decoration:none;transition:all .35s cubic-bezier(.25,.46,.45,.94);position:relative;white-space:nowrap}
.site-nav a .nav-label{opacity:0;transform:translateX(8px);transition:opacity .35s ease,transform .35s ease;font-size:.6rem;letter-spacing:2px}
.site-nav a .nav-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;transition:all .35s cubic-bezier(.25,.46,.45,.94)}
.site-nav a:hover .nav-label,.site-nav a.active .nav-label{opacity:1;transform:translateX(0)}
.site-nav a.active .nav-dot{width:6px;height:6px}

body.terminal .site-nav a{color:rgba(0,255,65,.4)}
body.terminal .site-nav a .nav-dot{background:rgba(0,255,65,.3)}
body.terminal .site-nav a:hover{color:#00ff41}
body.terminal .site-nav a:hover .nav-dot{background:#00ff41;box-shadow:0 0 8px rgba(0,255,65,.6)}
body.terminal .site-nav a.active{color:#00ff41}
body.terminal .site-nav a.active .nav-dot{background:#00ff41;box-shadow:0 0 10px rgba(0,255,65,.7);width:8px;height:8px;border-radius:0}

body.parchment .site-nav a{color:rgba(45,106,106,.4)}
body.parchment .site-nav a .nav-dot{background:rgba(45,106,106,.25)}
body.parchment .site-nav a:hover{color:#2d6a6a}
body.parchment .site-nav a:hover .nav-dot{background:#2d6a6a;box-shadow:0 0 6px rgba(45,106,106,.4)}
body.parchment .site-nav a.active{color:#2d6a6a}
body.parchment .site-nav a.active .nav-dot{background:#2d6a6a;box-shadow:0 0 8px rgba(45,106,106,.5);width:8px;height:8px}

@keyframes navpulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.site-nav a.pulse{animation:navpulse .6s ease}

#theme-bar{position:fixed;top:14px;right:20px;z-index:9999;display:flex;align-items:center;gap:6px}
#theme-dots{display:flex;gap:6px;background:rgba(30,30,30,.85);backdrop-filter:blur(8px);padding:5px 8px;border-radius:20px}

.tb{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s}
.tb:hover{transform:scale(1.15)}.tb.act{border-color:#fff}
.tb[data-t="terminal"]{background:linear-gradient(135deg,#050e05,#00ff41)}
.tb[data-t="parchment"]{background:linear-gradient(135deg,#f7f5f0,#2d6a6a)}

.sr-l{opacity:0;transform:translateX(-60px);transition:opacity .7s ease,transform .7s ease}
.sr-l.vis{opacity:1;transform:translateX(0)}

.sec-div{height:1px;margin:0 auto;max-width:500px;overflow:hidden;position:relative}
.sec-div::after{content:'';position:absolute;top:0;left:50%;width:0;height:1px;transition:width 1s ease,left 1s ease}
.sec-div.vis::after{width:100%;left:0}

body.terminal .sec-div::after{background:linear-gradient(90deg,transparent,rgba(0,255,65,.25),transparent)}
body.parchment .sec-div::after{background:linear-gradient(90deg,transparent,rgba(45,106,106,.25),transparent)}

.tw-name{overflow:hidden;white-space:nowrap;border-right:3px solid;animation:tw-blink .8s step-end infinite;display:inline-block}
.tw-name.tw-done{border-right-color:transparent;animation:none}
@keyframes tw-blink{0%,100%{border-right-color:currentColor}50%{border-right-color:transparent}}
@keyframes breathe{0%,100%{opacity:.75}50%{opacity:1}}
.breathe{animation:breathe 4s ease-in-out infinite}
@keyframes shimmer{0%{background-position:0 -100%}100%{background-position:0 200%}}
.blink-cursor{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes prompt-glow{0%,100%{text-shadow:0 0 0 transparent}50%{text-shadow:0 0 8px currentColor}}
.cmd-glow{animation:prompt-glow 3s ease-in-out infinite}

/* ======== TERMINAL ======== */
body.terminal{background:#050e05;color:#b0ffb0;font-family:'Share Tech Mono',monospace}
body.terminal .tw-name{border-right-color:#00ff41}

.terminal .scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.015) 2px,rgba(0,255,65,.015) 4px);pointer-events:none;z-index:9997}
.terminal .vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.6));pointer-events:none;z-index:9996}
.terminal .t-wrap{width:100%;position:relative;z-index:1;overflow-x:hidden}
.terminal .t-inner{max-width:860px;width:100%;margin:0 auto;padding:60px 48px 24px 48px;box-sizing:border-box}

.terminal .t-hero{min-height:88vh;display:flex;align-items:center;gap:40px}
.terminal .t-hero-left{flex:1;max-width:100%;width:100%}
.terminal .t-prompt{color:#00ff41;margin-bottom:4px;font-size:.82rem}
.terminal .t-hero h1{font-size:2.2rem;color:#00ff41;margin-bottom:8px}
.terminal .typewriter-line{font-size:.94rem;color:#7acc7a;min-height:1.4em}
.terminal .pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.terminal .pill-t{font-size:.72rem;padding:4px 13px;border:1px solid rgba(0,255,65,.2);color:#5aaa5a;transition:all .3s}
.terminal .pill-t:hover{border-color:#00ff41;color:#00ff41}
.terminal .hero-btns{display:flex;gap:12px;margin-top:20px}
.terminal .hb{font-size:.82rem;padding:11px 26px;cursor:pointer;transition:all .3s}
.terminal .hb-primary{background:rgba(0,255,65,.1);color:#00ff41;border:1px solid #00ff41}
.terminal .hb-primary:hover{background:rgba(0,255,65,.2);box-shadow:0 0 12px rgba(0,255,65,.2)}
.terminal .hb-secondary{background:transparent;color:#7acc7a;border:1px solid rgba(0,255,65,.3)}
.terminal .hb-secondary:hover{background:rgba(0,255,65,.05)}

.terminal .stats-strip{display:flex;gap:32px;padding:22px 0;border-top:1px solid rgba(0,255,65,.08);border-bottom:1px solid rgba(0,255,65,.08);margin:20px 0;flex-wrap:wrap}
.terminal .ss-item{text-align:left}
.terminal .ss-num{font-size:1.3rem;color:#00ff41}
.terminal .ss-lbl{font-size:.66rem;color:#3a6a3a;margin-top:2px}

.terminal .t-section{margin:56px 0;width:100%;box-sizing:border-box}
.terminal .t-sec-header{color:#00ff41;font-size:.86rem;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid rgba(0,255,65,.1)}
.terminal .t-comment{color:#3a6a3a;font-size:.76rem;margin-bottom:12px}

.terminal .about-me-box{padding:20px;border:1px solid rgba(0,255,65,.1);background:rgba(0,255,65,.015);margin-bottom:12px;width:100%;box-sizing:border-box}
.terminal .about-me-box p{font-size:.88rem;line-height:1.85;color:#8acc8a;word-wrap:break-word;overflow-wrap:break-word}
.terminal .about-me-box .am-label{font-size:.7rem;color:#3a6a3a;margin-bottom:8px}

.terminal .quote-block{padding:24px 0;text-align:center;font-size:.92rem;color:#5aaa5a;font-style:italic}
.terminal .quote-block::before,.terminal .quote-block::after{content:'"';color:#00ff41;font-size:1.4rem;font-style:normal}

.terminal .t-skill-cat{margin-bottom:32px}
.terminal .t-skill-cat-title{color:#00ff41;font-size:.76rem;margin-bottom:12px}
.terminal .t-skill-row{display:flex;align-items:center;gap:12px;margin-bottom:7px;font-size:.82rem}
.terminal .t-skill-name{min-width:125px;color:#7acc7a}
.terminal .t-skill-bar{flex:1;height:14px;background:rgba(0,255,65,.05);border:1px solid rgba(0,255,65,.1);overflow:hidden}
.terminal .t-skill-fill{height:100%;background:rgba(0,255,65,.2);box-shadow:inset 0 0 8px rgba(0,255,65,.15);transition:width 1.2s ease;width:0}
.terminal .t-skill-pct{min-width:38px;text-align:right;color:#00ff41;font-size:.76rem}

.terminal .t-proj{margin-bottom:24px;padding:18px;border:1px solid rgba(0,255,65,.08);background:rgba(0,255,65,.02)}

.terminal .tp-header{color:#00ff41;font-size:.82rem;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.terminal .impact-badge{font-size:.68rem;padding:3px 10px;background:rgba(0,255,65,.08);border:1px solid rgba(0,255,65,.15);color:#00ff41}
.terminal .t-proj p{font-size:.84rem;color:#7acc7a;line-height:1.6;margin-bottom:8px}
.terminal .tp-tools{display:flex;flex-wrap:wrap;gap:6px}
.terminal .tp-tool{font-size:.7rem;padding:3px 9px;border:1px solid rgba(0,255,65,.12);color:#5aaa5a;transition:all .3s}
.terminal .tp-tool:hover{border-color:#00ff41;color:#00ff41}
.terminal .tp-link{font-size:.72rem;color:#00ff41;margin-top:8px;display:inline-block;transition:all .3s}
.terminal .tp-link:hover{text-shadow:0 0 6px rgba(0,255,65,.4)}

.terminal .cp-item{margin-bottom:16px;padding-left:16px;border-left:2px solid rgba(0,255,65,.12);transition:all .3s}
.terminal .cp-item:hover{border-color:rgba(0,255,65,.3)}
.terminal .cp-item h3{font-size:.86rem;color:#00ff41;margin-bottom:4px}
.terminal .cp-item .cp-meta{font-size:.7rem;color:#3a6a3a;margin-bottom:4px}
.terminal .cp-item p{font-size:.82rem;color:#5aaa5a;line-height:1.5}

.terminal .t-ach{margin-bottom:18px;padding-left:16px;border-left:2px solid rgba(0,255,65,.12);transition:all .3s;background:linear-gradient(180deg,rgba(0,255,65,.04),transparent,rgba(0,255,65,.04));background-size:100% 300%;animation:shimmer 4s linear infinite}
.terminal .t-ach:hover{border-color:rgba(0,255,65,.3)}
.terminal .t-ach h3{font-size:.86rem;color:#00ff41;margin-bottom:4px}
.terminal .t-ach h3::before{content:'> ';color:#3a6a3a}
.terminal .t-ach p{font-size:.82rem;color:#5aaa5a;line-height:1.5}

.terminal .t-edu{margin-bottom:20px;padding-left:16px;border-left:2px solid rgba(0,255,65,.1);background:linear-gradient(180deg,rgba(0,255,65,.03),transparent,rgba(0,255,65,.03));background-size:100% 300%;animation:shimmer 4s linear infinite;transition:border-color .3s ease,transform .3s cubic-bezier(.34,1.56,.64,1),background-color .3s ease}
.terminal .t-edu .ei-date{font-size:.72rem;color:#00ff41}
.terminal .t-edu h3{font-size:.86rem;color:#8acc8a}
.terminal .t-edu .ei-school{font-size:.8rem;color:#5aaa5a}
.terminal .t-edu .ei-detail{font-size:.76rem;color:#3a6a3a}

.terminal .t-cert{margin-bottom:9px;font-size:.82rem;color:#7acc7a}
.terminal .t-cert::before{content:' ├── ';color:#3a6a3a}
.terminal .t-cert:last-child::before{content:' └── '}
.terminal .t-cert a{transition:color .3s}.terminal .t-cert a:hover{color:#00ff41}

.terminal .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.terminal .con-btn{display:flex;flex-direction:column;align-items:flex-start;gap:7px;padding:14px 16px;border:1px solid rgba(0,255,65,.1);background:rgba(0,255,65,.02);transition:all .35s cubic-bezier(.34,1.56,.64,1);cursor:pointer;text-decoration:none;color:inherit}
.terminal .con-btn:hover{border-color:rgba(0,255,65,.4);background:rgba(0,255,65,.06);box-shadow:0 0 12px rgba(0,255,65,.06);transform:scale(1.04);}
.terminal .con-btn svg{width:17px;height:17px;stroke:#00ff41;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.terminal .con-btn-lbl{font-size:.62rem;color:#3a6a3a;text-transform:uppercase;letter-spacing:1.5px}
.terminal .con-btn-val{font-size:.74rem;color:#7acc7a;word-break:break-all}

.terminal .learn-row{margin-bottom:7px;font-size:.82rem;color:#7acc7a;display:flex;gap:0}
.terminal .learn-row::before{content:'⟶ ';color:#3a6a3a}
.terminal .learn-row .lr-name{min-width:160px;display:inline-block}
.terminal .lr-status{color:#00ff41;font-size:.82rem}
.terminal .tb-row{margin-bottom:5px;font-size:.8rem;color:#5aaa5a}
.terminal .tb-row .tb-cat{color:#00ff41}
.terminal .beyond-row{font-size:.82rem;color:#7acc7a;margin-bottom:5px}
.terminal .beyond-row::before{content:'• ';color:#3a6a3a}
.terminal .resume-row{margin-top:14px;font-size:.82rem}
.terminal .resume-row a{color:#00ff41;transition:all .3s}
.terminal .resume-row a:hover{text-shadow:0 0 6px rgba(0,255,65,.4)}
.terminal .w-footer{text-align:center;padding:40px 0;font-size:.72rem;color:#2a4a2a;border-top:1px solid rgba(0,255,65,.06)}

.constellation-canvas{width:100%;height:280px;margin-top:16px}

/* ======== PARCHMENT ======== */
body.parchment{background:#f7f5f0;color:#3a3830;font-family:'Share Tech Mono',monospace;font-size:.94rem}
body.parchment .tw-name{border-right-color:#2d6a6a}

.parchment .p-margin-line{display:none}

.parchment .p-wrap{width:100%;position:relative;z-index:1;overflow-x:hidden}
.parchment .p-inner{max-width:860px;width:100%;margin:0 auto;padding:60px 48px 32px 48px;box-sizing:border-box}

.parchment .p-hero{min-height:88vh;display:flex;flex-direction:column;justify-content:center;gap:24px;padding:40px 0}
.parchment .p-hero-left{}

.parchment .p-typewriter{font-size:.86rem;color:#6a6a5a;min-height:1.4em}
.parchment .blink-cursor{animation:blink 1s step-end infinite;color:#2d6a6a}
.parchment .p-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px}
.parchment .pill-p{font-size:.66rem;padding:4px 12px;border:1px solid rgba(45,106,106,.18);color:#6a6a5a;background:rgba(45,106,106,.03);transition:all .3s}
.parchment .pill-p:hover{border-color:#2d6a6a;color:#2d6a6a}
.parchment .p-hero-btns{display:flex;gap:12px;margin-top:22px}
.parchment .p-hb{font-size:.76rem;padding:10px 22px;cursor:pointer;transition:all .3s}

.parchment .stats-strip{display:flex;gap:24px;padding:20px 0;border-top:1px solid rgba(45,106,106,.08);border-bottom:1px solid rgba(45,106,106,.08);margin:16px 0;flex-wrap:wrap;width:100%}
.parchment .ss-item{text-align:left}

.parchment .p-skill-cat{margin-bottom:26px}

// ── FALLBACK BG (when Three.js CDN blocked) ──
function startFallbackBg() {
  const isT = document.body.className === 'terminal';
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  // Reset canvas size
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  // Fill with correct bg color first — no bleed
  ctx.fillStyle = isT ? '#050e05' : '#f7f5f0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const col = isT ? '0,255,65' : '45,106,106';
  const count = 80;
  const stars = Array.from({length: count}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.4 + 0.2
  }));

  let fbAnimId;
  function draw() {
    fbAnimId = requestAnimationFrame(draw);
    // Solid bg fill every frame — no wash
    ctx.fillStyle = isT ? '#050e05' : '#f7f5f0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    stars.forEach(s => {
      const a = 0.15 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${col},${a})`;
      ctx.fill();
    });
  }
  draw();

  // Handle resize
  window.addEventListener('resize', () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  });
}

const isMobile = /Mobi|Android/i.test(navigator.userAgent);
let threeRenderer, threeScene, threeCamera, threeAnimId;
let currentBg = 'neural';
let bgObjects = {};
const BG_MAP = { terminal: ['neural','particles'], parchment: ['wave','wireframe'] };
const BG_DEFAULTS = { terminal:'hexgreen', parchment:'hex' };

function getThemeColors() {
  const isT = document.body.className === 'terminal';
  return isT
    ? { primary: 0x00ff41, secondary: 0x003300, accent: 0x7acc7a, bg: 0x050e05 }
    : { primary: 0x2d6a6a, secondary: 0x0b2a2a, accent: 0x8abfbf, bg: 0xf7f5f0 };
}

function initThree() {
  if (isMobile) { document.getElementById('bg-canvas').style.display='none'; return; }
  const canvas = document.getElementById('bg-canvas');
  threeRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  threeRenderer.setSize(innerWidth, innerHeight);
  threeRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  threeScene = new THREE.Scene();
  threeCamera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
  threeCamera.position.z = 5;
  addEventListener('resize', () => {
    threeRenderer.setSize(innerWidth, innerHeight);
    threeCamera.aspect = innerWidth / innerHeight;
    threeCamera.updateProjectionMatrix();
  });
}

function clearBgScene() {
  cancelAnimationFrame(threeAnimId);
  if (bgObjects.interval) clearInterval(bgObjects.interval);
  const rc = document.getElementById('rain-canvas');
  if (rc) { rc.style.display='none'; const ctx=rc.getContext('2d'); if(ctx) ctx.clearRect(0,0,rc.width,rc.height); }
  if (!threeScene) return;
  while(threeScene.children.length) threeScene.remove(threeScene.children[0]);
  bgObjects = {};
}



















// ── L: HEX GRID (animated) ──
function startHexGrid() {
  clearBgScene();
  const isT = document.body.className === 'terminal';
  const rc = document.getElementById('rain-canvas');
  if (!rc) return;
  rc.style.display='block'; rc.width=innerWidth; rc.height=innerHeight;
  const ctx = rc.getContext('2d');
  const col = isT ? '0,255,65' : '45,106,106';
  const bgFill = isT ? '#050e05' : '#f7f5f0';
  const R = 32;
  const HEX_H = Math.sqrt(3)*R;
  const HEX_W = 2*R;
  const hexes = [];

  for (let row=0; row<rc.height/HEX_H*2+4; row++) {
    for (let col2=0; col2<rc.width/(HEX_W*0.75)+4; col2++) {
      const x = col2*HEX_W*0.75 + (row%2===0?0:HEX_W*0.375);
      const y = row*HEX_H*0.5;
      hexes.push({
        x, y,
        phase: Math.random()*Math.PI*2,
        speed: Math.random()*0.4+0.15,
        lit: false,
        litTime: 0,
        litDur: Math.random()*145+70
      });
    }
  }

  // Randomly trigger hexes lighting up
  function triggerRandom() {
    const idx = Math.floor(Math.random()*hexes.length);
    hexes[idx].lit = true;
    hexes[idx].litTime = 0;
    // Cascade to neighbors
    hexes.forEach((h,i) => {
      if (i===idx) return;
      const d = Math.hypot(h.x-hexes[idx].x, h.y-hexes[idx].y);
      if (d < R*3 && Math.random()>0.5) {
        setTimeout(()=>{ h.lit=true; h.litTime=0; }, Math.random()*300+100);
      }
    });
  }

  const triggerInterval = setInterval(triggerRandom, 850);
  bgObjects.interval = triggerInterval;

  function hexPath(cx,cy,r) {
    ctx.beginPath();
    for (let i=0;i<6;i++){
      const a=Math.PI/180*(60*i-30);
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a))
           :ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    }
    ctx.closePath();
  }

  function draw() {
    threeAnimId = requestAnimationFrame(draw);
    ctx.fillStyle = bgFill; ctx.fillRect(0,0,rc.width,rc.height);
    const t = Date.now()*0.001;

    hexes.forEach(h => {
      // Ambient slow pulse
      const ambient = 0.5+0.5*Math.sin(t*h.speed+h.phase);

      let fillA = 0, strokeA = 0.04+ambient*0.04;

      if (h.lit) {
        h.litTime++;
        const progress = h.litTime/h.litDur;
        if (progress < 0.3) {
          fillA = (progress/0.3)*0.25;
          strokeA = 0.1+(progress/0.3)*0.4;
        } else if (progress < 0.7) {
          fillA = 0.25;
          strokeA = 0.5;
        } else {
          const fade = 1-(progress-0.7)/0.3;
          fillA = fade*0.25;
          strokeA = 0.1+fade*0.4;
        }
        if (h.litTime >= h.litDur) { h.lit=false; h.litTime=0; }
      }

      hexPath(h.x,h.y,R-1.5);
      ctx.strokeStyle=`rgba(${col},${strokeA})`; ctx.lineWidth=1; ctx.stroke();
      if (fillA>0.01) { ctx.fillStyle=`rgba(${col},${fillA})`; ctx.fill(); }

      // Inner dot for lit hexes
      if (h.lit && h.litTime < h.litDur*0.8) {
        ctx.beginPath(); ctx.arc(h.x,h.y,3,0,Math.PI*2);
        ctx.fillStyle=`rgba(${col},0.6)`; ctx.fill();
        ctx.shadowBlur=8; ctx.shadowColor=`rgba(${col},0.4)`;
        ctx.fill(); ctx.shadowBlur=0;
      }
    });
  }
  draw();
}












// ── KX: FLOW + CIRCUIT MINIMAL CLEAN MIX ──
function startFlowCircuit() {
  clearBgScene();
  const isT = document.body.className === 'terminal';
  const rc = document.getElementById('rain-canvas');
  if (!rc) return;
  rc.style.display='block'; rc.width=innerWidth; rc.height=innerHeight;
  const ctx = rc.getContext('2d');
  const col = isT ? '0,255,65' : '45,106,106';
  const W=rc.width, H=rc.height, t0=Date.now();
  // Minimal particles following flow
  const particles = Array.from({length:150}, ()=>({
    x:Math.random()*W, y:Math.random()*H, vx:0, vy:0, age:Math.random()*100
  }));
  // Sparse circuit nodes
  const grid=64;
  const nodes=[];
  for(let x=grid;x<W;x+=grid) for(let y=grid;y<H;y+=grid) nodes.push({x,y});
  // Signals between nodes
  const signals=Array.from({length:6},()=>({
    from:Math.floor(Math.random()*nodes.length),
    to:Math.floor(Math.random()*nodes.length),
    t:Math.random(), speed:0.008+Math.random()*0.006
  }));
  function noise(x,y,t){ return Math.sin(x*0.006+t*0.4)*Math.cos(y*0.005+t*0.3); }
  function draw() {
    threeAnimId=requestAnimationFrame(draw);
    const t=(Date.now()-t0)*0.0003;
    if(isT) ctx.fillStyle='rgba(5,14,5,0.045)';
    else    ctx.fillStyle='rgba(247,245,240,0.045)';
    ctx.fillRect(0,0,W,H);
    // Faint node grid
    nodes.forEach(n=>{
      ctx.beginPath(); ctx.arc(n.x,n.y,1,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col},0.06)`; ctx.fill();
    });
    // Clean edges between close nodes
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d<grid*1.45){
        ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle=`rgba(${col},0.04)`; ctx.lineWidth=0.8; ctx.stroke();
      }
    }
    // Signals
    signals.forEach(s=>{
      s.t+=s.speed; if(s.t>=1){s.t=0;s.from=s.to;s.to=Math.floor(Math.random()*nodes.length);}
      const a=nodes[s.from],b=nodes[s.to];
      if(!a||!b) return;
      const px=a.x+(b.x-a.x)*s.t, py=a.y+(b.y-a.y)*s.t;
      ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col},0.8)`; ctx.fill();
      ctx.shadowBlur=6; ctx.shadowColor=`rgba(${col},0.5)`; ctx.fill(); ctx.shadowBlur=0;
    });
    // Flow particles
    particles.forEach(p=>{
      const angle=noise(p.x,p.y,t)*Math.PI*2;
      p.vx=p.vx*0.9+Math.cos(angle)*0.4; p.vy=p.vy*0.9+Math.sin(angle)*0.4;
      p.x+=p.vx; p.y+=p.vy; p.age++;
      if(p.x<0||p.x>W||p.y<0||p.y>H||p.age>130){
        p.x=Math.random()*W; p.y=Math.random()*H; p.vx=0; p.vy=0; p.age=0;
      }
      ctx.beginPath(); ctx.arc(p.x,p.y,0.6,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col},${Math.min(p.age/40,1)*0.2})`; ctx.fill();
    });
  }
  draw();
}

function drawConstellation(id){const c=document.getElementById(id);if(!c)return;const x=c.getContext('2d');const d=Math.max(devicePixelRatio||1,2);const W=c.offsetWidth,H=c.offsetHeight;c.width=W*d;c.height=H*d;x.scale(d,d);x.imageSmoothingEnabled=true;x.imageSmoothingQuality='high';const isT=id.includes('terminal');const col=isT?'0,255,65':'45,106,106';const t=Date.now()/4000;const ns=CONSTELLATION_NODES.map((n,i)=>({...n,dx:n.x*W+Math.sin(t+i)*6,dy:n.y*H+Math.cos(t+i*.7)*4}));x.clearRect(0,0,W,H);// Use stored index for consistent line/node highlighting
const hi = (typeof c._hoveredIdx !== 'undefined') ? c._hoveredIdx : -1;

// Draw all base lines first (faint)
CONSTELLATION_LINKS.forEach(([a,b])=>{
  if(hi>=0&&(a===hi||b===hi)) return; // skip — draw highlighted below
  x.beginPath();x.moveTo(ns[a].dx,ns[a].dy);x.lineTo(ns[b].dx,ns[b].dy);
  x.strokeStyle=`rgba(${col},.18)`;x.lineWidth=1.2;x.stroke();
});

// Draw highlighted lines on top (only lines FROM the hovered node)
if(hi>=0){
  CONSTELLATION_LINKS.forEach(([a,b])=>{
    if(a===hi||b===hi){
      x.beginPath();x.moveTo(ns[a].dx,ns[a].dy);x.lineTo(ns[b].dx,ns[b].dy);
      x.strokeStyle=`rgba(${col},.9)`;x.lineWidth=2.2;x.stroke();
    }
  });
}

// Draw all nodes
ns.forEach((n,i)=>{
  const isHov = i===hi;
  x.beginPath();x.arc(n.dx,n.dy,isHov?7:4,0,Math.PI*2);
  x.fillStyle=`rgba(${col},${isHov?.9:.4})`;
  x.fill();
  const fontSize=isHov?14:12;
  x.font=`${fontSize}px "Share Tech Mono",monospace`;
  x.fillStyle=`rgba(${col},${isHov?1:.7})`;
  x.fillText(n.name,n.dx+(isHov?10:8),n.dy+(isHov?5:4));
});}

function initWordReveal() {
  const boxes = document.querySelectorAll('.about-me-box p');
  boxes.forEach(p => {
    if (p.dataset.wordified) return;
    p.dataset.wordified = '1';
    const words = p.textContent.split(' ');
    p.innerHTML = words.map((w,i) =>
      `<span class="word-reveal" style="opacity:0;transition:opacity .4s ease ${i*0.04}s,transform .4s ease ${i*0.04}s;display:inline-block;transform:translateY(8px);margin-right:.25em">${w}</span>`
    ).join('');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          p.querySelectorAll('.word-reveal').forEach(w => {
            w.style.opacity = '1';
            w.style.transform = 'translateY(0)';
          });
          io.unobserve(p);
        }
      });
    }, {threshold: 0.2});
    io.observe(p);
  });
}


// ── CONSTELLATION HOVER INTERACTIVITY ──
function initConstellationHover() {
  ['constellation-terminal','constellation-parchment'].forEach(id => {
    const c = document.getElementById(id);
    if (!c || c._hoverInit) return;
    c._hoverInit = true;

    let tooltip = document.getElementById('constellation-tooltip');
    if (!tooltip) {
      tooltip = document.createElement('div');
      tooltip.id = 'constellation-tooltip';
      tooltip.className = 'constellation-tooltip';
      document.body.appendChild(tooltip);
    }

    const skillPct = {};
    SKILLS.forEach(cat => cat.items.forEach(s => { skillPct[s.name] = s.pct; }));

    c.style.cursor = 'crosshair';

    c.addEventListener('mousemove', e => {
      const rect = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      // Convert mouse to canvas logical coords
      const mx = (e.clientX - rect.left) * (c.width / rect.width) / dpr;
      const my = (e.clientY - rect.top)  * (c.height / rect.height) / dpr;
      const W = rect.width, H = rect.height;
      // Use same t formula as drawConstellation
      const t = Date.now() / 4000;

      let hitIdx = -1;
      let minDist = 999;
      CONSTELLATION_NODES.forEach((n, i) => {
        // Exact same position formula as drawConstellation
        const nodeX = n.x * W + Math.sin(t + i) * 6;
        const nodeY = n.y * H + Math.cos(t + i * 0.7) * 4;
        const dist = Math.sqrt((nodeX - mx) ** 2 + (nodeY - my) ** 2);
        if (dist < 36 && dist < minDist) {
          minDist = dist;
          hitIdx = i;
        }
      });

      if (hitIdx >= 0) {
        const node = CONSTELLATION_NODES[hitIdx];
        const pct = skillPct[node.name];
        tooltip.textContent = pct ? `${node.name} — ${pct}%` : node.name;
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top  = (e.clientY - 12) + 'px';
        tooltip.className = 'constellation-tooltip visible';
        // Store INDEX not name — draw loop uses index for line matching
        c._hoveredIdx = hitIdx;
        c._hoveredNode = node.name;
        c.style.cursor = 'pointer';
      } else {
        tooltip.className = 'constellation-tooltip';
        c._hoveredIdx = -1;
        c._hoveredNode = null;
        c.style.cursor = 'crosshair';
      }
    });

    c.addEventListener('mouseleave', () => {
      const tt = document.getElementById('constellation-tooltip');
      if (tt) tt.className = 'constellation-tooltip';
      c._hoveredIdx = -1;
      c._hoveredNode = null;
      c.style.cursor = 'crosshair';
    });
  });
}

let photoOpen = false;

function initPhotoCard() {
  // Add photo card to both hero h1s
  ['tw-hero-terminal','tw-hero-parchment'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || el._photoInit) return;
    el._photoInit = true;
    const h1 = el.closest('h1');
    if (!h1) return;

    // Create card
    const card = document.createElement('div');
    card.className = 'hero-photo-card';
    card.id = 'photo-card-' + id;
    card.innerHTML = `<div class="hero-photo-frame"><img src="${PHOTO_SRC}" alt="Guruansh Singh" /></ div><div class="hero-photo-tag">guruansh.03</div>`;
    h1.style.position = 'relative';
    h1.appendChild(card);

    // Click name → toggle
    h1.addEventListener('click', e => {
      e.stopPropagation();
      const visible = card.classList.toggle('visible');
      photoOpen = visible;
    });
  });

  // Click anywhere else → close
  document.addEventListener('click', () => {
    if (!photoOpen) return;
    document.querySelectorAll('.hero-photo-card').forEach(c => c.classList.remove('visible'));
    photoOpen = false;
  });
}

function initPhotoEffects() { initPhotoCard(); }

let navObserver=null;
function initNavObserver(){
  if(navObserver){navObserver.disconnect();navObserver=null;}
  const navLinks=document.querySelectorAll('.site-nav a[data-section]');
  if(!navLinks.length)return;
  const activeWrapper=document.getElementById('w-'+cur);
  if(!activeWrapper)return;
  const sections=NAV_ITEMS.map(n=>activeWrapper.querySelector('#'+n.id)).filter(Boolean);
  if(!sections.length)return;
  navLinks.forEach(a=>a.classList.remove('active'));
  navLinks[0].classList.add('active');
  navObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        navLinks.forEach(a=>a.classList.remove('active'));
        const active=document.querySelector(`.site-nav a[data-section="${e.target.id}"]`);
        if(active){
          active.classList.add('active');
          active.classList.add('pulse');
          setTimeout(()=>active.classList.remove('pulse'),600);
        }
      }
    });
  },{threshold:0.1,rootMargin:'0px 0px -20% 0px'});
  sections.forEach(s=>navObserver.observe(s));
}

document.addEventListener('DOMContentLoaded',()=>{
  buildNav();buildTerminal();buildParchment();
  document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>sw(b.getAttribute('data-t'))));
  try { initThree(); } catch(e) {
    console.warn('Three.js init failed — using fallback',e);
    startFallbackBg();
  }
  updateBgBar('terminal');
  initLenis();
  initObs();initCount();animBars('.t-skill-fill');
  startTW('tw-line-terminal',50,30);
  typeHN('tw-hero-terminal',HERO_NAME,80);
  animC();
  setTimeout(()=>{ initNavObserver(); initGSAP(); initWordReveal(); initConstellationHover(); initPhotoEffects(); },400);
});

// Inline photo reveal on name click
document.addEventListener('click', e => {
  const h1 = e.target.closest('.t-hero h1');
  const photo = document.getElementById('inline-photo');
  if (!photo) return;
  if (h1 && document.body.className==='terminal') {
    photo.classList.toggle('open');
  }
});
</script>
